<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Inversiones Darme</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css?v=2.0">
    
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-main) 0%, var(--bg-surface) 100%);
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }
        .logo-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo-header i {
            font-size: 3.5rem;
            color: var(--color-accent);
            margin-bottom: 1rem;
        }
        .logo-header h1 {
            font-size: 1.75rem;
            color: var(--text-main);
            font-weight: 800;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-header">
            <i class="fa-solid fa-truck-monster"></i>
            <h1>Inversiones Darme</h1>
            <p class="text-muted">Plataforma de Mantenimiento</p>
        </div>
        
        <div class="card">
            <form method="post">
                {% csrf_token %}
                
                {% if form.errors %}
                <div style="background: hsla(0, 84%, 60%, 0.1); color: var(--color-danger); padding: 1rem; border-radius: var(--radius-md); margin-bottom: 1.5rem; font-size: 0.9rem;">
                    Usuario o contraseña incorrectos.
                </div>
                {% endif %}

                <div class="form-group">
                    <label class="form-label">Usuario</label>
                    <input type="text" name="username" class="form-control" placeholder="Ingrese su usuario" required autofocus>
                </div>
                
                <div class="form-group" style="margin-bottom: 2rem;">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem;">
                    Iniciar Sesión
                </button>
                
                <div style="text-align: center; margin-top: 1.5rem;">
                    <a href="{% url 'mobile_login' %}" style="color: var(--text-main); font-size: 0.9rem; font-weight: 600;">
                        <i class="fa-solid fa-mobile-screen"></i> Ir al Portal de Técnicos
                    </a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>

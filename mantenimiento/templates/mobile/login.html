<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acceso Técnicos | Darme</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/mobile.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background: var(--bg-main);
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-logo {
            font-size: 3rem;
            color: var(--color-primary);
            margin-bottom: 1rem;
        }
    </style>
</head>
<body class="mobile-app">
    <div class="login-card mobile-card">
        <div class="login-logo">
            <i class="fa-solid fa-truck-monster"></i>
        </div>
        <h1 style="margin-bottom: 2rem;">Acceso Técnicos</h1>
        
        {% if form.errors %}
            <div style="color: var(--color-danger); margin-bottom: 1rem; font-weight: 600;">
                Usuario o contraseña incorrectos.
            </div>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <div style="margin-bottom: 1rem; text-align: left;">
                <label style="font-weight: 600;">Usuario</label>
                <input type="text" name="username" class="mobile-input" required autofocus>
            </div>
            <div style="margin-bottom: 2rem; text-align: left;">
                <label style="font-weight: 600;">Contraseña</label>
                <input type="password" name="password" class="mobile-input" required>
            </div>
            <button type="submit" class="btn-mobile primary">
                <i class="fa-solid fa-right-to-bracket"></i> Ingresar a Mis Órdenes
            </button>
        </form>
    </div>
</body>
</html>
